<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{{ .Title }}</title>
        <style>
            body {
                font-family: sans-serif;
                font-size: 20px;
                color: #222222;
                margin: 16px;
            }

            .site-container {
                max-width: 640px;
                margin: 4em auto 6em auto;
            }

            h1 {
                font-size: 40px;
                line-height: 1em;
                margin: 40px 0 20px 0;
            }

            h2 {
                font-size: 30px;
                line-height: 1em;
                margin: 60px 0 10px 0;
            }

            p {
                font-size: 20px;
                line-height: 1.5em;
                margin: 10px 0 0 0;
            }

            a {
                color: #0060a0;
                text-decoration: none;
                border-bottom: 1px solid rgba(0, 96, 160, 0.2);
            }
            a:hover {
                color: #d04000;
                border-bottom-color: rgba(208, 64, 0, 0.2);
            }
            h1 a {
                border-bottom-width: 2px;
            }

            img {
                max-width: 100%;
            }

            .contact-item {
                height: 1.5em;
            }

            .contact-item__logo {
                height: calc(1.5em - 6px);
                position: relative;
                top: 5px;
                margin-right: 6px;
            }
        </style>
    </head>
    <body>
        <div class="site-container">
            <h1>{{ .Title }}</h1>
            {{ block "main" . }}{{ end }}
        </div>
    </body>
</html>
